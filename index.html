<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Угадай число</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>Угадай число</h1>
    <div class="form-group">
        <label for="guessInput">Введите число от 1 до 100:</label>
        <input type="number" id="guessInput" />
    </div>
    <button id="guessButton">Попробовать</button>
    <button id="newGameButton">Новая игра</button>

    <div class="result">
        <p id="resultText">Я загадал число от 1 до 100. Попробуй угадать!</p>
        <p id="attemptsText">Попыток: 0</p>
    </div>

    <script>
        let secretNumber;
        let attempts = 0;

        function startNewGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1; // 1–100
            attempts = 0;
            document.getElementById("resultText").textContent =
                "Я загадал число от 1 до 100. Попробуй угадать!";
            document.getElementById("attemptsText").textContent =
                "Попыток: 0";
            document.getElementById("guessInput").value = "";
        }

        document.getElementById("guessButton").addEventListener("click", function () {
            const input = document.getElementById("guessInput");
            const value = input.value.trim();

            if (!value || isNaN(Number(value))) {
                document.getElementById("resultText").textContent =
                    "Введите целое число!";
                return;
            }

            const guess = parseInt(value, 10);
            attempts++;

            if (guess === secretNumber) {
                document.getElementById("resultText").textContent =
                    `Поздравляю! Ты угадал число ${secretNumber} за ${attempts} попыток!`;
            } else if (guess < secretNumber) {
                document.getElementById("resultText").textContent =
                    "Моё число БОЛЬШЕ. Попробуй ещё!";
            } else {
                document.getElementById("resultText").textContent =
                    "Моё число МЕНЬШЕ. Попробуй ещё!";
            }

            document.getElementById("attemptsText").textContent =
                `Попыток: ${attempts}`;
        });

        document.getElementById("newGameButton").addEventListener("click", function () {
            startNewGame();
        });

        // запускаем новую игру при загрузке страницы
        startNewGame();
    </script>
</body>
</html>
